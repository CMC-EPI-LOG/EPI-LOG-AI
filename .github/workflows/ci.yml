name: AI CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  ci:
    name: ai-ci
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Compileall smoke
        run: python -m compileall app main.py

      - name: Run pytest
        run: pytest

      - name: Start local server
        run: |
          uvicorn main:app --host 127.0.0.1 --port 8001 > /tmp/ai-api.log 2>&1 &
          echo "AI_PID=$!" >> "$GITHUB_ENV"

      - name: Wait for healthz
        run: |
          for i in $(seq 1 30); do
            if curl -sf "http://127.0.0.1:8001/api/healthz" >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          tail -n 100 /tmp/ai-api.log || true
          exit 1

      - name: Curl health and proxy
        run: |
          curl -fsS "http://127.0.0.1:8001/api/healthz"
          curl -fsS "http://127.0.0.1:8001/api/openai/v1/health"

      - name: Stop local server
        if: always()
        run: |
          if [ -n "$AI_PID" ]; then
            kill "$AI_PID" >/dev/null 2>&1 || true
          fi
          tail -n 100 /tmp/ai-api.log || true
